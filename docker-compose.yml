services:
  admin:
    image: ghcr.io/authfailed/summeroom-admin:${TAG:-latest}
    pull_policy: always
    container_name: summeroom-admin
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${PORT:-8081}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
